name = "homura-todo-app"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[build]
command = "npm run bundle:ruby"
watch_dir = ["app", "../../lib"]

# Enable wasm support
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]

# D1 database binding
[[d1_databases]]
binding = "HOMURA_DB"
# NOTE: This ID is environment-specific. Replace with your own after `wrangler d1 create`
database_name = "homura-todo-db"
database_id = "07887fda-7726-4e5f-90ea-4a5ca5ff603f"
